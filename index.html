<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <!-- Icona e titolo  -->
    <link rel="shortcut icon" href="favicon.ico" />
    <title>Lim: By Booleaners for Booleaners  </title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main>
      <header>
        <!-- Logo Lim -->
        <div class="logo"></div>
      </header>
      <!-- Contenitore dalla parte "core" -->
      <div class="core">
        <!-- Testo "titolo"  -->
        <div id="titolo">Taking Booleaners from A to B </div>
        <!-- Contenitore di tutti i "button" -->
        <div class="comandi">
          <!-- Button -->
            <button type="button" name="button">Prenota</button>
            <button type="button" name="Termina">Termina Prenotazione</button>
            <button type="button" name="Accendi">Accendi Luci</button>
        </div>
        <!-- Monopattini disponibili -->
        <div class="Monopattini">
          <!-- Monopattino 1 -->
          <!-- ID Monopattino -->
          <span class="id-monopattino "><input type="checkbox" class="check">Monopattino Gino22</span>
          <br>
          <!-- Posizione -->
          <span class="indirizzo">↦Via Guadalamechi - a 220 metri da te</span>
          <!-- Stato carica -->
          <div class="carica">
            <span>Stato carica:</span>
            <div class="percentuale" id="mono1"></div>
          </div>
          <!-- Monopattino 2 -->
          <!-- ID Monopattino -->
          <span class="id-monopattino "><input type="checkbox" class="check">Monopattino Mike24</span>
          <br>
          <!-- Posizione -->
          <span class="indirizzo">↦Via Ricciardoni - a 420 metri da te</span>
          <!-- Stato carica -->
          <div class="carica">
            <span>Stato carica:</span>
            <div class="percentuale" id="mono2"></div>
          </div>
          <!-- Monopattino 3 -->
          <!-- ID Monopattino -->
          <span class="id-monopattino "><input type="checkbox" class="check">Monopattino Fede154</span>
          <br>
          <!-- Posizione -->
          <span class="indirizzo">↦Via Mentarini - a 490 metri da te</span>
          <!-- Stato carica -->
          <div class="carica">
            <span>Stato carica:</span>
            <div class="percentuale" id="mono3"></div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
